<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abhinay Mhatre</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lenis@1.1.14/dist/lenis.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="reach-out">
      <div class="navbar">
        <nav>
          <div class="main-logo hover-underline">
            <a href="index.html"> © Abhi Design & Strategy</a>
            <div class="line"></div>
          </div>
          <div class="sub-menu hover-underline">
            <a href=""> Projects</a>
            <div class="line"></div>
          </div>
          <div class="sub-menu hover-underline">
            <a href="about.html"> About</a>
            <div class="line"></div>
          </div>
          <div class="sub-menu hover-underline">
            <a href="contacts.html"> Contact</a>
            <div class="line"></div>
          </div>
          <i class="ri-menu-line"></i>
        </nav>
      </div>
      <div class="main-section">
        <div class="first-container">Reach Out</div>
        <div class="second-container">
          <div class="form-container">
            <div class="header">
              Tell me about your idea. <span>I'll take it from there.</span>
            </div>
            <input
              type="text"
              name="name"
              id="name"
              autocomplete="off"
              placeholder="Your name"
            />
            <input
              type="text"
              name="designation"
              id="designation"
              autocomplete="off"
              placeholder="Job title"
            />
            <input
              type="text"
              name="email"
              id="email"
              placeholder="Email"
              autocomplete="off"
            />
            <textarea
              placeholder="Message"
              name="message"
              autocomplete="off"
              id="message"
            ></textarea>
            <div class="button-container">
              <div class="initial-text">Send Message</div>
              <div class="below-text">Send Message</div>
              <span class="animated-color"></span>
            </div>
          </div>
          <div class="secondary-content">
            <div class="contacts-container">
              <div class="mail">
                Mail: <span>abhinaymhatre1234@gmail.com</span>
              </div>
              <div class="phone">Phone: <span>+91 7738281080</span></div>
            </div>
            <div class="socials">
              <div class="linkedin social-icon">
                <i class="ri-linkedin-box-fill i"></i
                ><span class="text"> Linkedin</span>
              </div>
              <div class="twitter social-icon">
                <i class="ri-twitter-x-fill i"></i
                ><span class="text"> Twitter</span>
              </div>
              <div class="instagram social-icon">
                <i class="ri-instagram-line i"></i
                ><span class="text"> Instagram</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="page-transition"></div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
      integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://unpkg.com/split-type"></script>
    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="contacts.js"></script>
  </body>
</html>
